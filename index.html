<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>L'univers de Méliane</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:600px;
}

h1{
    font-size:32px;
    margin-bottom:20px;
}

p{
    line-height:1.6;
    opacity:0.9;
}

button{
    margin-top:35px;
    padding:15px 30px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:white;
    color:#203a43;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}
</style>
</head>

<body>

<div class="container">
    <h1>Bienvenue dans mon univers 💙</h1>

    <p>
        Je m'appelle <b>Méliane</b>.<br><br>
        Mon histoire, mes souvenirs, mes vidéos, mes photos,  
        mon journal intime… tout est conservé dans mon espace privé.<br><br>
        Si tu es arrivé(e) ici, ce n’est pas un hasard.<br>
        Tu es spécial(e) pour moi.
    </p>

    <button onclick="ouvrirJournal()">
        Clique pour te connecter et accéder à mon journal intime
    </button>
</div>

<script>
function ouvrirJournal(){
    // 🔴 METS TON VRAI LIEN ICI
    window.location.href = "https://shorturl.at/ixjGj";
}
</script>

</body>
</html>
